[server]
headless = true
enableCORS = false
enableXsrfProtection = true

# Hides Streamlit's built-in hamburger menu (Deploy button, "View app source"
# link to the GitHub repo, Settings, etc.) from every visitor. Now that the
# repo is public, that menu was a one-click path from the live app straight
# to the full source code — minimal mode removes that chrome entirely.
[client]
toolbarMode = "minimal"

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#00d4aa"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1a1f2e"
textColor = "#fafafa"
font = "monospace"

[runner]
fastReruns = true
