# ─────────────────────────────────────────────────────────────────────────────
# AI Cyber Shield — Production nginx Configuration
#
# Deployment:
#   1. Replace YOUR_DOMAIN with your actual domain (e.g. scanner.example.com)
#   2. Run: certbot --nginx -d YOUR_DOMAIN   (installs Let's Encrypt)
#   3. Copy this file to: /etc/nginx/sites-available/aics.conf
#   4. ln -s /etc/nginx/sites-available/aics.conf /etc/nginx/sites-enabled/
#   5. nginx -t && systemctl reload nginx
#
# Services expected on localhost:
#   :8501  — Streamlit UI (streamlit run url_scanner_app.py)
#   :8000  — FastAPI REST API (uvicorn api.main:app --port 8000)
#
# Why this config gets you a high scanner score:
#   - HTTPS with TLS 1.2/1.3 only → SSL check passes
#   - HSTS with preload → HSTS check passes
#   - All security headers → headers check passes
#   - CSP is Streamlit-compatible (allows inline scripts required by Streamlit)
#   - Cookies proxied through HTTPS → Secure flag possible
#   - Rate limiting at nginx layer → protects from scan abuse
# ─────────────────────────────────────────────────────────────────────────────

# Rate limiting zones (defined in http block — add to nginx.conf if needed)
# limit_req_zone $binary_remote_addr zone=scan_api:10m rate=10r/m;
# limit_req_zone $binary_remote_addr zone=webhook:10m  rate=60r/m;

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # ACME challenge (Let's Encrypt renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — main server ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── TLS certificates (populated by certbot) ───────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # ── TLS hardening ─────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout          5s;

    # ── Security headers ──────────────────────────────────────────────────────

    # HSTS — 1 year, includeSubDomains, preload (submit to hstspreload.org)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Allow same-origin iframes only (Streamlit uses iframes for components)
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions policy — disable sensors not needed
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # CORP / COEP / COOP (Spectre mitigations)
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Opener-Policy   "same-origin-allow-popups" always;
    # Note: COEP "require-corp" breaks Streamlit CDN assets — use unsafe-none
    add_header Cross-Origin-Embedder-Policy "unsafe-none" always;

    # ── Content Security Policy (Streamlit-compatible) ────────────────────────
    # Streamlit requires:
    #   - 'unsafe-inline' for scripts (uses inline <script> tags)
    #   - 'unsafe-eval' for its JS runtime (pyodide / custom components)
    #   - wss: for WebSocket connection to Python backend
    #   - blob: for PDF download links
    #   - fonts.googleapis.com / fonts.gstatic.com for fonts
    # Adjust YOUR_DOMAIN in connect-src if you add a separate API subdomain.
    add_header Content-Security-Policy "
        default-src 'self';
        script-src  'self' 'unsafe-inline' 'unsafe-eval' blob:;
        style-src   'self' 'unsafe-inline' fonts.googleapis.com;
        font-src    'self' fonts.gstatic.com data:;
        img-src     'self' data: blob:;
        media-src   'self' blob:;
        connect-src 'self' wss://YOUR_DOMAIN ws://YOUR_DOMAIN https://YOUR_DOMAIN;
        frame-src   'self';
        object-src  'none';
        base-uri    'self';
        form-action 'self' https://checkout.stripe.com https://billing.stripe.com;
    " always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/aics_access.log;
    error_log  /var/log/nginx/aics_error.log warn;

    # ── Stripe webhook — no rate limit (Stripe retries, must not block) ───────
    location /api/v1/billing/webhook {
        proxy_pass              http://127.0.0.1:8000;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        # Critical: do NOT buffer request body — Stripe sig verification needs raw bytes
        proxy_request_buffering off;
        proxy_read_timeout      30s;
    }

    # ── FastAPI REST API ──────────────────────────────────────────────────────
    location /api/ {
        # Rate limit API: 10 scans/min per IP (adjust for your scale)
        # limit_req zone=scan_api burst=5 nodelay;

        proxy_pass            http://127.0.0.1:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;   # scans can take up to 90s
    }

    # ── Streamlit UI (WebSocket-capable proxy) ────────────────────────────────
    location / {
        proxy_pass          http://127.0.0.1:8501;
        proxy_http_version  1.1;

        # WebSocket upgrade (Streamlit uses WS for live updates)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for streaming scan results
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;

        # Disable buffering — Streamlit streams data incrementally
        proxy_buffering off;
    }

    # ── Block common probe paths ──────────────────────────────────────────────
    location ~* \.(env|git|svn|bak|sql|log|conf|ini)$ {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}
